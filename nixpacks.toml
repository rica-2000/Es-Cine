[variables]
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.bcmath", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.fileinfo", "php82Extensions.dom", "php82Extensions.gd", "php82Extensions.zip", "nodejs_20", "npm-10_x", "composer"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci --no-audit --no-fund"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "bash scripts/railway-start.sh"
